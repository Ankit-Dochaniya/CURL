<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PDF Flipbook</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://unpkg.com/page-flip/dist/js/page-flip.browser.js"></script>
</head>
<body>
  <div id="upload-zone">
    <input type="file" id="file-input" accept=".pdf">
    <label for="file-input">Drag your PDF here or click to upload</label>
  </div>
  <div id="book-container" style="display: none;">
    <div id="book"></div>
    <div id="progress-ring">
      <svg width="56" height="56">
        <circle cx="28" cy="28" r="22" fill="none" stroke="#ddd" stroke-width="4"/>
        <circle cx="28" cy="28" r="22" fill="none" stroke="#4A90D9" stroke-width="4" stroke-dasharray="138.2" stroke-dashoffset="138.2" transform="rotate(-90 28 28)"/>
      </svg>
      <span id="pct-text">0% complete</span>
    </div>
    <div id="stats-bar">
      <span>⏱</span>
      <span id="pace-text">2 min/page</span>
      <span>·</span>
      <span id="time-left">0 min left</span>
    </div>
  </div>
  <div id="nav-controls" style="display: none;">
    <button id="btn-prev">Prev</button>
    <span id="page-counter">Page 1 of ?</span>
    <button id="btn-next">Next</button>
  </div>
  <script src="app.js"></script>
</body>
</html>
