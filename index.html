<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kindle Style Flipbook</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://unpkg.com/page-flip/dist/js/page-flip.browser.js"></script>
</head>
<body>
  
  <div id="top-bar">
    <div class="logo">PDF Reader</div>
    <div class="controls">
      <button id="btn-toggle-view">Switch to 1-Page View</button>
      <button id="btn-upload" onclick="document.getElementById('file-input').click()">Upload New PDF</button>
    </div>
  </div>

  <div id="upload-zone">
    <input type="file" id="file-input" accept=".pdf">
    <div class="upload-message">
      <h2>Upload a Document</h2>
      <p>Drag your PDF here or click to select a file</p>
    </div>
  </div>

  <div id="book-container" style="display: none;">
    <button id="btn-prev" class="side-btn">‹</button>
    <div id="book"></div>
    <button id="btn-next" class="side-btn">›</button>
  </div>

  <div id="bottom-bar" style="display: none;">
    <div class="stats-row">
      <span id="pace-text">Calculating...</span>
      <span id="time-left"></span>
      <span id="page-counter">Page 1</span>
      <span id="pct-text">0%</span>
    </div>
    <div class="progress-container">
      <div id="progress-fill"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
