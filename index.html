<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CURL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" defer></script>
  <script src="/page-flip.browser.js" defer></script>
  <script type="module" src="/app.js"></script>
</head>

<body>

  <div id="top-bar">
    <div class="logo">CURL</div>
    <div class="top-nav">
      <div class="user-profile" id="user-profile" style="display: none;">
        <button class="avatar-btn" id="avatar-btn">?</button>
        <div class="profile-dropdown" id="profile-dropdown">
          <div class="profile-name" id="profile-name">User</div>
          <div class="profile-divider"></div>
          <button id="btn-logout" class="profile-logout-btn">Logout</button>
        </div>
      </div>
    </div>
  </div>

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="screen active-screen">
    <div class="auth-box">
      <h2>Welcome</h2>
      <input type="email" id="auth-email" placeholder="Email address" required>
      <input type="password" id="auth-password" placeholder="Password" required>
      <div id="auth-error" class="error-msg"></div>
      <button id="btn-login" class="primary-btn">Log In</button>
      <button id="btn-signup" class="secondary-btn">Sign Up</button>
      <div class="divider">or</div>
      <button id="btn-google" class="google-btn">
        <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            fill="#4285F4" />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853" />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
            fill="#FBBC05" />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#EA4335" />
        </svg>
        Sign in with Google
      </button>
    </div>
  </div>

  <!-- DASHBOARD SCREEN -->
  <div id="dashboard-screen" class="screen" style="display: none;">
    <div class="dashboard-grid" id="books-grid">
      <!-- Upload Tile -->
      <div class="book-tile upload-tile" id="upload-tile">
        <div class="upload-icon">+</div>
        <div>Upload</div>
        <input type="file" id="file-input" accept=".pdf" style="display:none;">
      </div>
      <!-- Books will be injected here -->
    </div>
  </div>

  <!-- RENAME MODAL -->
  <div id="rename-modal" class="modal" style="display: none;">
    <div class="modal-content">
      <h3>Name Your Book</h3>
      <input type="text" id="rename-input" placeholder="Book Title">
      <div class="modal-actions">
        <button id="btn-cancel-upload" class="secondary-btn">Cancel</button>
        <button id="btn-confirm-upload" class="primary-btn">Upload & Continue</button>
      </div>
    </div>
  </div>

  <!-- NAME MODAL -->
  <div id="name-modal" class="modal" style="display: none;">
    <div class="modal-content">
      <h3>What should we call you?</h3>
      <input type="text" id="name-input" placeholder="Your Name">
      <div class="modal-actions">
        <button id="btn-save-name" class="primary-btn">Save Name</button>
      </div>
    </div>
  </div>

  <!-- UPLOAD LOADING ZONE (used during rendering/uploading) -->
  <div id="upload-zone" style="display: none;">
    <div class="upload-message" id="upload-status">Loading PDF... Please wait.</div>
  </div>

  <!-- READER SCREEN -->
  <div id="book-container" style="display: none;">
    <button id="btn-close-book" class="close-btn">&times;</button>
    <button id="btn-prev" class="side-btn">‹</button>
    <div id="flipbook-wrapper">
      <div id="book"></div>
    </div>
    <button id="btn-next" class="side-btn">›</button>
  </div>

  <div id="bottom-bar" style="display: none;">
    <div class="stats-row">
      <span id="pace-text">Calculating...</span>
      <span id="time-left"></span>
      <span id="page-counter"></span>
    </div>
    <div class="progress-bar-bg">
      <div id="progress-fill" class="progress-bar-fill"></div>
    </div>
    <div class="progress-text">
      <span id="pct-text">0%</span>
    </div>
  </div>

</body>

</html>
